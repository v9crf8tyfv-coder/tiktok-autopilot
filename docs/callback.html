<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autorisation TikTok — Automatique</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:640px;margin:60px auto;padding:0 20px;line-height:1.6;color:#111;text-align:center}
  .code{font-family:ui-monospace,Menlo,monospace;font-size:1.1em;background:#f4f4f5;border:1px solid #e4e4e7;border-radius:12px;padding:18px;word-break:break-all;margin:20px 0}
  button{background:#fe2c55;color:#fff;border:0;border-radius:10px;padding:12px 20px;font-size:1em;cursor:pointer}
  .ok{color:#16a34a;font-weight:700}
</style>
</head>
<body>
  <h1>✅ Autorisation réussie</h1>
  <p>Copie ce code et colle-le dans le chat pour finaliser la connexion :</p>
  <div class="code" id="code">…</div>
  <button onclick="copier()">Copier le code</button>
  <p id="msg"></p>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  document.getElementById('code').textContent = code || "Aucun code trouvé dans l'URL.";
  function copier(){
    navigator.clipboard.writeText(code || "").then(function(){
      document.getElementById('msg').innerHTML = '<span class="ok">Code copié !</span>';
    });
  }
</script>
</body>
</html>
