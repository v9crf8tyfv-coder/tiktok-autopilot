name: TikTok Autopilot quotidien

# Tourne sur les serveurs GitHub (gratuit) — ton PC peut être ÉTEINT.
on:
  schedule:
    # 16:00 UTC = 18:00 heure de Paris en été (17:00 en hiver).
    # Pour changer l'heure de publication, modifie cette ligne.
    - cron: "0 16 * * *"
  workflow_dispatch: {}   # bouton "Run workflow" pour tester à la demande

concurrency:
  group: autopilot
  cancel-in-progress: false

permissions:
  contents: write   # pour réécrire data/history.json (mémoire des sujets déjà faits)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dépendances système (police + ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y fonts-liberation

      - name: Dépendances Python
        run: pip install -r requirements.txt

      # Persiste le jeton TikTok d'un jour à l'autre (rafraîchi automatiquement)
      - name: Restaurer le jeton TikTok
        uses: actions/cache/restore@v4
        with:
          path: data/tiktok_token.json
          key: tiktok-token-none
          restore-keys: |
            tiktok-token-

      - name: Générer + publier la vidéo du jour
        env:
          NICHE: ${{ vars.NICHE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_MODE: ${{ vars.TIKTOK_MODE }}
          FONT_NAME: "Liberation Sans"
          FONT_FILE: "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
        run: python src/run_daily.py

      - name: Sauvegarder le jeton TikTok rafraîchi
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/tiktok_token.json
          key: tiktok-token-${{ github.run_id }}

      - name: Mémoriser les sujets déjà traités
        if: always()
        run: |
          git config user.name "autopilot-bot"
          git config user.email "autopilot@users.noreply.github.com"
          git add data/history.json || true
          git commit -m "chore: historique sujets $(date +%F)" || echo "rien à committer"
          git push || echo "push ignoré"

      - name: Garder la vidéo du jour (téléchargeable dans l'onglet Actions)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-du-jour
          path: |
            output/**/*.mp4
            output/**/caption.txt
          retention-days: 7
          if-no-files-found: ignore
